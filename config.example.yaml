# Kopieren nach config.yaml. Hier nur Verbindungseinstellungen und Pfade — keine URLs.
#
# Seiten-Definition: pages.yaml (siehe pages.example.yaml)

pushover:
  user_key: "YOUR_PUSHOVER_USER_KEY"
  api_token: "YOUR_PUSHOVER_APP_TOKEN"

notify:
  on_failure: true
  on_recovery: true

# Relativ zum Ordner von config.yaml (oder absolut)
pages_file: pages.yaml

# Zweiter Check-Typ (optional)
extra_checks:
  - name: "NUK von außen erreichbar"
    type: http
    url: "https://ihre-ddns.example/health"
    expect_status: 200
    timeout_seconds: 15
