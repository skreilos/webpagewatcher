# Kopieren nach config.yaml. Hier nur Keys und Pfade — lokal, nicht einchecken.
#
# Seiten: pages.yaml (liegt im Repo, gemeinsam versioniert).

pushover:
  user_key: "YOUR_PUSHOVER_USER_KEY"
  api_token: "YOUR_PUSHOVER_APP_TOKEN"

notify:
  # on_failure: auch beim allersten Lauf, wenn ein Check schon fehlschlägt
  on_failure: true
  on_recovery: true
  # Erneute Meldung, solange der Check fehlschlägt (Minuten). 0 = nur bei Wechseln.
  repeat_failure_reminder_minutes: 180
  # Nach jedem Check-Lauf zusätzlich Start-Push mit Kurz-Status (Host + OK/Fehler).
  # Docker nutzt stattdessen einmalig monitor.py --startup-ping im Container-CMD.
  on_startup: false
  # Sonntag morgen (Ortszeit): eine Zusammenfassung aller Checks — „Watcher lebt“
  weekly_status:
    enabled: true
    weekday: sunday   # monday … sunday oder 0–6 (Python: Mo=0, So=6)
    hour: 10
    minute: 0
    timezone: Europe/Zurich
    window_minutes: 15   # z. B. 10:00–10:14; ein Lauf pro ISO-Kalenderwoche

# Relativ zum Ordner von config.yaml (oder absolut)
pages_file: pages.yaml

# Zweiter Check-Typ (optional)
extra_checks:
  # Home Assistant via Cloudflare: /api/ gibt 401 zurück (kein Token) — beweist, dass HA läuft.
  - name: "NUK von außen erreichbar"
    type: http
    url: "https://home.the-force.ch/api/"
    expect_status: 401
    timeout_seconds: 15
