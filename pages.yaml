# Überwachte Seiten (ohne Geheimnisse — liegt im Repo).
# Keys nur in config.yaml (lokal, nicht einchecken).
#
# expect_body_contains: ein String ODER Liste — alle Teilstrings müssen vorkommen.
#
# navigation: zusätzliche Checks pro Menüpunkt (gleiche Site).
#   - Ohne url/path: gleiche URL wie die übergeordnete Seite (One-Pager mit Ankern).
#   - anchor / anchors: HTML id= muss vorkommen (Groß/Kleinschreibung egal).
#   - path: relativ zur url der übergeordneten Seite, z. B. /impressum/
#   - url: absolute Adresse (z. B. Unterseiten bei WordPress ?page_id=…)
# Erbt von der übergeordneten Seite: expect_status, timeout_seconds, verify_tls

pages:
  # Immer erreichbar — prüft, ob der Monitor + Pushover-Lauf grundsätzlich funktioniert.
  - name: "Selbsttest example.com"
    url: "https://example.com/"
    expect_status: 200
    timeout_seconds: 20
    expect_body_contains:
      - "Example Domain"

  - name: "Coiffeur Nora"
    url: "https://coiffeurnora.ch/"
    expect_status: 200
    timeout_seconds: 45
    expect_body_contains:
      - "Coiffeur Nora"
      - "Beromünster"
      - "Willkommen bei Coiffeur Nora"
    navigation:
      - name: "Über uns"
        anchor: aboutus
      - name: "Team"
        anchor: stylists
      - name: "Preise"
        anchor: prices
      - name: "Galerie"
        anchor: gallery
      - name: "Öffnungszeiten"
        anchor: openingtimes
      - name: "Kontakt"
        anchor: contact

  # Seebadi: Seite derzeit oft mit falschem Inhalt / im Umbau.
  # Nur „erreichbar + HTTP 200“ — keine Text- und Nav-Checks, bis die Site wieder stimmt.
  # Später ergänzen: expect_body_contains + navigation (siehe Git-History commit vor Lockern).
  - name: "Seebadi Wollishofen"
    url: "https://www.seebadiwollishofen.ch/"
    expect_status: 200
    timeout_seconds: 45
    verify_tls: false

  - name: "Massagepraxis Zirbenkraft"
    url: "https://massagepraxis-zirbe.ch/"
    expect_status: 200
    timeout_seconds: 45
    expect_body_contains:
      - "Massagepraxis Zirbenkraft"
      - "Zirbenkraft"
      - "Chilematte"
    navigation:
      - name: "Was ist Zirbe"
        anchor: Zirbe
      - name: "Angebot"
        anchor: Angebot
      - name: "Über mich"
        anchor: Team
      - name: "Kontakt"
        anchor: Kontakt
      - name: "Impressum"
        path: /impressum/
        expect_body_contains:
          - "Impressum"
          - "Massagepraxis"
      - name: "Datenschutz"
        path: /datenschutzerklaerung-dse/
        expect_body_contains:
          - "Datenschutz"
