services:
  webpage-watcher:
    build: .
    container_name: webpage-watcher
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./pages.yaml:/app/pages.yaml:ro
      - watcher-data:/data
    environment:
      WEBPAGE_WATCHER_STATE_FILE: /data/state.json
      WEBPAGE_WATCHER_INTERVAL_SECONDS: "900"
      # Optional statt Werte in config.yaml:
      # PUSHOVER_USER_KEY: ""
      # PUSHOVER_API_TOKEN: ""
    # Ping-Checks: ICMP im Container (sonst extra_checks nur type: http nutzen)
    cap_add:
      - NET_RAW

volumes:
  watcher-data:
